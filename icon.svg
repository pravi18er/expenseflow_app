<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for beautiful premium gradients and filters -->
  <defs>
    <!-- Background Gradient (Android Material 3 Deep Violet) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6750A4" />
      <stop offset="100%" stop-color="#381E72" />
    </linearGradient>

    <!-- Accent Card Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0BCFF" />
      <stop offset="100%" stop-color="#9A82DB" />
    </linearGradient>

    <!-- Coin Gradient -->
    <linearGradient id="coin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD8E4" />
      <stop offset="100%" stop-color="#EFB8C8" />
    </linearGradient>

    <!-- Drop Shadow Filter for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.25" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Rounded Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Soft glow behind the wallet element -->
  <ellipse cx="256" cy="270" rx="140" ry="80" fill="#9A82DB" opacity="0.15" filter="url(#glow)" />

  <!-- 3D Layered Wallet Shape -->
  <g filter="url(#shadow)">
    <!-- Wallet Main Back Body -->
    <rect x="136" y="196" width="240" height="152" rx="24" fill="url(#card-grad)" />

    <!-- Wallet Flap (Accent) -->
    <path d="M 280,196 L 352,196 C 365,196 376,207 376,220 L 376,256 C 376,269 365,280 352,280 L 280,280 C 267,280 256,269 256,256 L 256,220 C 256,207 267,196 280,196 Z" fill="#EADDFF" />

    <!-- Wallet Flap Button Lock -->
    <circle cx="292" cy="238" r="14" fill="#6750A4" />
    <circle cx="292" cy="238" r="6" fill="#FFFFFF" />

    <!-- Trend Up Chart Line coming out of the wallet -->
    <path d="M 160,280 L 200,240 L 240,260 L 300,200 L 340,220" fill="none" stroke="#FEF7FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

    <!-- Sparkle Stars -->
    <path d="M 330,130 L 334,142 L 346,146 L 334,150 L 330,162 L 326,150 L 314,146 L 326,142 Z" fill="#FFD8E4" />
    <path d="M 150,150 L 152,156 L 158,158 L 152,160 L 150,166 L 148,160 L 142,158 L 148,156 Z" fill="#D0BCFF" />
  </g>

  <!-- Small floating coin -->
  <circle cx="180" cy="150" r="28" fill="url(#coin-grad)" filter="url(#shadow)" />
  <circle cx="180" cy="150" r="16" fill="none" stroke="#633B48" stroke-width="3" opacity="0.4" />
</svg>
